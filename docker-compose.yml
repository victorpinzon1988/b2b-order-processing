services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: b2b-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: b2b-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
  
  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: b2b-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic orders-topic --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic orders-dlt --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --list
      "

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: b2b-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: b2b-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  order-ingest-api:
    build: 
      context: ./order-ingest-api
      dockerfile: Dockerfile
    container_name: b2b-order-ingest-api
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      ORDERS_TOPIC: orders-topic

  clients-api:
    build: 
      context: ./clients-api
      dockerfile: Dockerfile
    container_name: b2b-clients-api
    ports:
      - "8082:8082"
    environment:
      PORT: 8082
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CLIENTS_CACHE_TTL_SECONDS: 300
      CLIENTS_CACHE_NAMESPACE: clients:v1

  products-api:
    build: 
      context: ./products-api
      dockerfile: Dockerfile
    container_name: b2b-products-api
    ports:
      - "8081:8081"
    environment:
      PORT: 8081
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PRODUCTS_CACHE_NAMESPACE: products:v1
      PRODUCTS_CACHE_TTL_SECONDS: 300

  mongodb:
    image: mongo:7.0
    container_name: b2b-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: b2b_user
      MONGO_INITDB_ROOT_PASSWORD: b2b_password
      MONGO_INITDB_DATABASE: orders_db
    volumes:
      - mongodb-data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
  
  mongo-express:
    image: mongo-express:1.0.2
    container_name: b2b-mongo-express
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "8083:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: b2b_user
      ME_CONFIG_MONGODB_ADMINPASSWORD: b2b_password
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH: false

  redis:
    image: redis:7.2-alpine
    container_name: b2b-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: b2b-redis-commander
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8084:8081"
    environment:
      REDIS_HOSTS: local:redis:6379

  order-worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: b2b-order-worker
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      products-api:
        condition: service_started
      clients-api:
        condition: service_started
    ports:
      - "8085:8080"
    environment:
      SERVER_PORT: 8080
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      ORDERS_TOPIC: orders-topic
      ORDERS_DLT_TOPIC: orders-dlt
      ORDERS_CONSUMER_GROUP: order-worker-group
      MONGODB_URI: mongodb://b2b_user:b2b_password@mongodb:27017/orders_db?authSource=admin
      PRODUCTS_API_BASE_URL: http://products-api:8081
      CLIENTS_API_BASE_URL: http://clients-api:8082


volumes:
  mongodb-data:
  redis-data:
