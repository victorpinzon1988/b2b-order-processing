server:
  port: ${SERVER_PORT:7001}

spring:
  application:
    name: order-worker
  threads:
    virtual:
      enabled: true
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://b2b_user:b2b_password@localhost:27017/orders_db?authSource=admin}

app:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    orders-topic: ${ORDERS_TOPIC:orders-topic}
    dlt-topic: ${ORDERS_DLT_TOPIC:orders-dlt}
    consumer-group: ${ORDERS_CONSUMER_GROUP:order-worker-group}

  external-apis:
    products-base-url: ${PRODUCTS_API_BASE_URL:http://localhost:8081}
    clients-base-url: ${CLIENTS_API_BASE_URL:http://localhost:8082}

resilience4j:
  retry:
    instances:
      productsApi:
        max-attempts: 3
        wait-duration: 500ms
      clientsApi:
        max-attempts: 3
        wait-duration: 500ms

  circuitbreaker:
    instances:
      productsApi:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
      clientsApi:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
